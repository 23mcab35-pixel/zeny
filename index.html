<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENVY Store</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

<style>
body {
  background: #f1f3f6;
}

/* Navbar */
.navbar {
  background: #131921;
}
.navbar-brand {
  color: #00d4ff !important;
  font-weight: bold;
}
.nav-link {
  color: white !important;
}

/* Search */
.search-box input {
  border-radius: 0;
}

/* Hero */
.hero {
  background: url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f') center/cover;
  height: 350px;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  text-shadow: 0 0 10px black;
}

/* Cards */
.card:hover {
  transform: scale(1.05);
  transition: 0.3s;
}
.price {
  color: green;
  font-weight: bold;
}

/* Footer */
footer {
  background: #131921;
  color: white;
  padding: 15px;
  text-align: center;
}
</style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg">
<div class="container">
<a class="navbar-brand" href="#">ZENVY</a>

<div class="search-box mx-auto w-50 d-flex">
<input type="text" class="form-control" placeholder="Search products...">
<button class="btn btn-warning"><i class="bi bi-search"></i></button>
</div>

<ul class="navbar-nav">
<li class="nav-item">
<a class="nav-link" href="#">Cart (<span id="cart">0</span>)</a>
</li>
</ul>
</div>
</nav>

<!-- Hero -->
<div class="hero">
<h1>Big Sale - Up to 50% OFF</h1>
</div>

<!-- Products -->
<div class="container my-5">
<div class="row g-4">

<div class="col-md-3">
<div class="card">
<img src="https://images.unsplash.com/photo-1526170375885-4d8ecf77b99f" class="card-img-top">
<div class="card-body text-center">
<h5>Headphones</h5>
<p class="price">₹1999</p>
<button class="btn btn-primary" onclick="add()">Add</button>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card">
<img src="https://images.unsplash.com/photo-1491553895911-0055eca6402d" class="card-img-top">
<div class="card-body text-center">
<h5>Shoes</h5>
<p class="price">₹2499</p>
<button class="btn btn-primary" onclick="add()">Add</button>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card">
<img src="https://images.unsplash.com/photo-1520975916090-3105956dac38" class="card-img-top">
<div class="card-body text-center">
<h5>Bag</h5>
<p class="price">₹1499</p>
<button class="btn btn-primary" onclick="add()">Add</button>
</div>
</div>
</div>

<div class="col-md-3">
<div class="card">
<img src="https://images.unsplash.com/photo-1523381210434-271e8be1f52b" class="card-img-top">
<div class="card-body text-center">
<h5>Jacket</h5>
<p class="price">₹2999</p>
<button class="btn btn-primary" onclick="add()">Add</button>
</div>
</div>
</div>

</div>
</div>

<!-- Footer -->
<footer>
<p>© 2026 ZENVY Store</p>
</footer>

<!-- JS -->
<script>
let count = 0;
function add(){
  count++;
  document.getElementById("cart").innerText = count;
}
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
